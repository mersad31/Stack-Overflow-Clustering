project:
  name: stackoverflow-developer-profile-clustering
  year: 2024
  random_state: 42
  language: fa

paths:
  survey_csv: survey_results_public.csv
  schema_csv: survey_results_schema.csv
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  artifacts_dir: artifacts
  figures_dir: reports/figures
  tables_dir: reports/tables
  notebooks_dir: notebooks

data:
  chunk_size: 10000
  selected_columns:
    - ResponseId
    - MainBranch
    - Check
    - YearsCode
    - YearsCodePro
    - WorkExp
    - OrgSize
    - Employment
    - RemoteWork
    - Country
    - LanguageHaveWorkedWith
    - DatabaseHaveWorkedWith
    - PlatformHaveWorkedWith
    - WebframeHaveWorkedWith
    - EmbeddedHaveWorkedWith
    - MiscTechHaveWorkedWith
    - ToolsTechHaveWorkedWith
    - DevType
    - EdLevel
    - AISelect
    - ConvertedCompYearly
  clustering_columns:
    - YearsCode
    - YearsCodePro
    - WorkExp
    - OrgSize
    - Employment
    - RemoteWork
    - Country
    - LanguageHaveWorkedWith
    - DatabaseHaveWorkedWith
    - PlatformHaveWorkedWith
    - WebframeHaveWorkedWith
    - EmbeddedHaveWorkedWith
    - MiscTechHaveWorkedWith
    - ToolsTechHaveWorkedWith
  supplementary_columns:
    - DevType
    - EdLevel
    - AISelect
    - ConvertedCompYearly
  technology_columns:
    - LanguageHaveWorkedWith
    - DatabaseHaveWorkedWith
    - PlatformHaveWorkedWith
    - WebframeHaveWorkedWith
    - EmbeddedHaveWorkedWith
    - MiscTechHaveWorkedWith
    - ToolsTechHaveWorkedWith
  country_min_count: 200
  require_any_technology_response: true

features:
  scalers:
    - standard
    - robust
    - minmax
  selected_scaler: robust
  pca_components: 50
  umap_neighbors: 30
  umap_min_dist: 0.05
  umap_sample_size: 15000

tendency:
  hopkins_sample_size: 1500
  hopkins_repeats: 10
  vat_sample_size: 1000

phase2:
  k_values: [2, 3, 4, 5, 6, 7, 8, 9, 10, 12]
  partitioning_n_init: 10
  stability_seeds: 20
  bootstrap_repeats: 20
  bootstrap_fraction: 0.7
  bootstrap_fit_size: 15000
  bootstrap_k_repeats: 8
  evaluation_sample_size: 5000
  dunn_sample_size: 1200
  gap_sample_size: 4000
  gap_reference_repeats: 3
  coassociation_sample_size: 400
  family_sample_size: 3000
  family_k_values: [2, 3, 4, 5, 6, 7, 8]
  minimum_cluster_fraction: 0.02

bonus:
  enabled: true
  nmf_components: [2, 3, 4, 5, 6]
  nmf_batch_size: 2048
  nmf_max_iter: 150
  bootstrap_sample_size: 1200
  bootstrap_repeats: 200
  permutation_repeats: 5000
  split_clusters: 2
  umap_3d_sample_size: 10000
